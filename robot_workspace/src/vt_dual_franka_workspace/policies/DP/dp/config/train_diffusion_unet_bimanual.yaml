defaults:
  - train_diffusion_unet
  - override task: univtac_bimanual
  - _self_

name: dp_bimanual
_target_: dp.workspace.train_diffusion_unet_hybrid_workspace.TrainDiffusionUnetHybridWorkspace
dataset: dp.dataset.univtac_replay_image_dataset.UniVTACReplayImageDataset

shape_meta:
  obs:
    robot0_eye_in_hand_image:
      shape: [3, 224, 224]
      horizon: ${img_obs_horizon}
      type: rgb
    robot1_eye_in_hand_image:
      shape: [3, 224, 224]
      horizon: ${img_obs_horizon}
      type: rgb
    robot0_tactile_left_image:
      shape: [3, 224, 224]
      horizon: ${img_obs_horizon}
      type: tactile_rgb
    robot1_tactile_right_image:
      shape: [3, 224, 224]
      horizon: ${img_obs_horizon}
      type: tactile_rgb
    qpos:
      shape: [20]
      horizon: ${low_dim_obs_horizon}
      type: low_dim
  action:
    shape: [20]

task:
  shape_meta: ${shape_meta}
  dataset:
    shape_meta: ${shape_meta}

policy:
  _target_: dp.policy.manifeel_policy.ManiFeelPolicy
  shape_meta: ${shape_meta}
  noise_scheduler:
    _target_: diffusers.schedulers.scheduling_ddpm.DDPMScheduler
    num_train_timesteps: 100
    beta_start: 0.0001
    beta_end: 0.02
    beta_schedule: squaredcos_cap_v2
    variance_type: fixed_small
    clip_sample: true
    prediction_type: epsilon
  obs_encoder:
    _target_: dp.model.vision.multi_image_obs_encoder.MultiImageObsEncoder
    shape_meta: ${shape_meta}
    rgb_model:
      _target_: dp.model.vision.model_getter.get_resnet
      name: resnet18
      weights: null
    resize_shape: null
    crop_shape: null
    random_crop: true
    use_group_norm: true
    share_rgb_model: false
    imagenet_norm: true
  horizon: ${horizon}
  n_action_steps: ${eval:'${n_action_steps}+${n_latency_steps}'}
  n_obs_steps: ${n_obs_steps}
  num_inference_steps: 100
  diffusion_step_embed_dim: 128
  down_dims: [512, 1024, 2048]
  kernel_size: 5
  n_groups: 8
  cond_predict_scale: true

logging:
  name: dp_bimanual_demo${n_demo}
  tags: [dp_bimanual, ${task_name}]
