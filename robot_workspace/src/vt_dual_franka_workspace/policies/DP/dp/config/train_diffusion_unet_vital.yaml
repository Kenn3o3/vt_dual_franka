defaults:
  - train_diffusion_unet
  - override task: univtac_tact_lr
  - _self_

name: vital_dp

_target_: dp.workspace.train_diffusion_unet_hybrid_workspace.TrainDiffusionUnetHybridWorkspace
dataset: dp.dataset.univtac_replay_image_dataset.UniVTACReplayImageDataset

shape_meta:
  obs:
    robot0_eye_in_hand_image:
      shape: [3, 84, 84]
      horizon: ${img_obs_horizon}
      type: rgb
    robot0_tactile_left_image:
      shape: [3, 84, 84]
      horizon: ${img_obs_horizon}
      type: tactile_rgb
    robot0_tactile_right_image:
      shape: [3, 84, 84]
      horizon: ${img_obs_horizon}
      type: tactile_rgb
    robot0_eef_pos:
      shape: [3]
      horizon: ${low_dim_obs_horizon}
    robot0_eef_quat:
      shape: [4]
      horizon: ${low_dim_obs_horizon}
    robot0_gripper_qpos:
      shape: [2]
      horizon: ${low_dim_obs_horizon}
  action:
    shape: [10]

task:
  shape_meta: ${shape_meta}
  dataset:
    shape_meta: ${shape_meta}

policy:
  _target_: dp.policy.manifeel_policy.ManiFeelPolicy
  shape_meta: ${shape_meta}

  noise_scheduler:
    _target_: diffusers.schedulers.scheduling_ddpm.DDPMScheduler
    num_train_timesteps: 100
    beta_start: 0.0001
    beta_end: 0.02
    beta_schedule: squaredcos_cap_v2
    variance_type: fixed_small
    clip_sample: True
    prediction_type: epsilon

  obs_encoder:
    _target_: dp.model.vision.vital_obs_encoder.ViTALObsEncoder
    shape_meta: ${shape_meta}
    vision_backbone_path: checkpoints/VITAL_encoder/vision_encoder.pth
    gelsight_backbone_path: checkpoints/VITAL_encoder/gelsight_encoder.pth
    freeze_backbones: true
    vision_imagenet_norm: true
    tactile_imagenet_norm: false

  horizon: ${horizon}
  n_action_steps: ${eval:'${n_action_steps}+${n_latency_steps}'}
  n_obs_steps: ${n_obs_steps}
  num_inference_steps: 100
  diffusion_step_embed_dim: 128
  down_dims: [512, 1024, 2048]
  kernel_size: 5
  n_groups: 8
  cond_predict_scale: True

logging:
  name: vital_dp_demo${n_demo}
  tags: ["${name}", "${task_name}", "${exp_name}"]

hydra:
  job:
    override_dirname: ${name}
  run:
    dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}_demo${n_demo}
  sweep:
    dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}_demo${n_demo}
    subdir: ${hydra.job.num}
