defaults:
  - _self_
  - task: univtac_vista

name: vista
_target_: vista.workspace.train_vista_workspace.TrainVISTAWorkspace

shape_meta: ${task.shape_meta}
exp_name: "default"

dataset_root: /home/zlkenny/kenny/visuotact/UniVTAC/data
data_split: clean
task_name: lift_can
n_demo: 100
horizon: 16
n_obs_steps: 2
n_action_steps: 8
n_latency_steps: 0
dataset_obs_steps: ${n_obs_steps}
past_action_visible: False
dataset: vista.dataset.univtac_replay_image_so3_sym_dataset.UniVTACReplayImageSO3SymDataset

policy:
  _target_: vista.policy.vista_so3_policy.VISTAPolicy
  shape_meta: ${shape_meta}

  noise_scheduler:
    _target_: diffusers.schedulers.scheduling_ddpm.DDPMScheduler
    num_train_timesteps: 100
    beta_start: 0.0001
    beta_end: 0.02
    beta_schedule: squaredcos_cap_v2
    variance_type: fixed_small
    clip_sample: True
    prediction_type: epsilon

  horizon: ${horizon}
  n_action_steps: ${eval:'${n_action_steps}+${n_latency_steps}'}
  n_obs_steps: ${n_obs_steps}
  num_inference_steps: 100
  crop_shape: null
  diffusion_step_embed_dim: 128
  enc_n_hidden: 128
  down_dims: [256, 512, 1024]
  kernel_size: 5
  n_groups: 8
  cond_predict_scale: True
  rot_aug: False

  lmax: 6
  visual_dim: 1024
  tactile_dim: 1024
  fused_dim: 1024
  so3_dim: 64
  initialize: True
  encoder: "equiresnet50"
  tactile_shape: [3, 84, 84]
  rec_level: 3
  max_beta: 1.5707963267948966
  attention_heads: 8
  attention_head_dim: 64
  tactile_mode: raw

ema:
  _target_: vista.model.diffusion.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

dataloader:
  batch_size: 32
  num_workers: 16
  shuffle: True
  pin_memory: True
  persistent_workers: True
  drop_last: true

val_dataloader:
  batch_size: 32
  num_workers: 16
  shuffle: False
  pin_memory: True
  persistent_workers: True

optimizer:
  betas: [0.95, 0.999]
  eps: 1.0e-08
  learning_rate: 0.0001
  weight_decay: 1.0e-06

training:
  device: "cuda:0"
  seed: 0
  debug: False
  resume: True
  lr_scheduler: cosine
  lr_warmup_steps: 500
  num_epochs: 100
  gradient_accumulate_every: 1
  use_ema: True
  checkpoint_mode: topk_val_loss
  checkpoint_every: ${eval:'1000 / ${n_demo}'}
  val_every: 1
  sample_every: 5
  max_train_steps: null
  max_val_steps: null
  log_every_steps: 10
  cudnn_benchmark: True
  tqdm_interval_sec: 1.0

logging:
  project: vista_${task_name}
  entity: roccendalanda-cuhk
  resume: True
  mode: online
  name: ${name}_demo${n_demo}
  tags: ["${name}", "${task_name}", "${exp_name}"]
  id: null
  group: null

checkpoint:
  topk:
    monitor_key: val_loss
    mode: min
    k: 1
    format_str: 'best.ckpt'
  save_last_ckpt: False
  save_last_snapshot: False

multi_run:
  run_dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}_demo${n_demo}
  wandb_name_base: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}_demo${n_demo}

hydra:
  job:
    override_dirname: ${name}
  run:
    dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}_demo${n_demo}
  sweep:
    dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}_demo${n_demo}
    subdir: ${hydra.job.num}
