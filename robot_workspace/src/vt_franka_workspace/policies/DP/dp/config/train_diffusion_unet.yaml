defaults:
  - _self_
  - task: univtac

name: diff_c
_target_: dp.workspace.train_diffusion_unet_hybrid_workspace.TrainDiffusionUnetHybridWorkspace

exp_name: "default"

dataset_root: /home/zlkenny/kenny/visuotact/UniVTAC/data
data_split: clean
task_name: lift_can
n_demo: 100
horizon: 16
n_obs_steps: 2
low_dim_obs_horizon: 2
img_obs_horizon: 2
n_action_steps: 8
n_latency_steps: 0
dataset_obs_steps: ${n_obs_steps}
past_action_visible: False
obs_as_global_cond: True
dataset: dp.dataset.univtac_replay_image_dataset.UniVTACReplayImageDataset

shape_meta:
  obs:
    robot0_eye_in_hand_image:
      shape: [3, 84, 84]
      horizon: ${img_obs_horizon}
      type: rgb
    robot0_eef_pos:
      shape: [3]
      horizon: ${low_dim_obs_horizon}
    robot0_eef_quat:
      shape: [4]
      horizon: ${low_dim_obs_horizon}
    robot0_gripper_qpos:
      shape: [2]
      horizon: ${low_dim_obs_horizon}
  action:
    shape: [10]

policy:
  _target_: dp.policy.manifeel_policy.ManiFeelPolicy

  shape_meta: ${shape_meta}

  noise_scheduler:
    _target_: diffusers.schedulers.scheduling_ddpm.DDPMScheduler
    num_train_timesteps: 100
    beta_start: 0.0001
    beta_end: 0.02
    beta_schedule: squaredcos_cap_v2
    variance_type: fixed_small # Yilun's paper uses fixed_small_log instead, but easy to cause Nan
    clip_sample: True # required when predict_epsilon=False
    prediction_type: epsilon # or sample

  horizon: ${horizon}
  n_action_steps: ${eval:'${n_action_steps}+${n_latency_steps}'}
  n_obs_steps: ${n_obs_steps}
  num_inference_steps: 100
  diffusion_step_embed_dim: 128
  down_dims: [512, 1024, 2048]
  kernel_size: 5
  n_groups: 8
  cond_predict_scale: True

ema:
  _target_: dp.model.diffusion.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

dataloader:
  batch_size: 64
  num_workers: 16
  shuffle: True
  pin_memory: True
  persistent_workers: True

val_dataloader:
  batch_size: 64
  num_workers: 16
  shuffle: False
  pin_memory: True
  persistent_workers: True

optimizer:
  _target_: torch.optim.AdamW
  lr: 1.0e-4
  betas: [0.95, 0.999]
  eps: 1.0e-8
  weight_decay: 1.0e-6

training:
  device: "cuda:0"
  seed: 0
  debug: False
  resume: True
  lr_scheduler: cosine
  lr_warmup_steps: 500
  num_epochs: 100
  gradient_accumulate_every: 1
  use_ema: True
  checkpoint_mode: topk_val_loss
  checkpoint_every: ${eval:'1000 / ${n_demo}'}
  val_every: 1
  sample_every: 5
  max_train_steps: null
  max_val_steps: null
  log_every_steps: 10
  cudnn_benchmark: True
  tqdm_interval_sec: 1.0

logging:
  project: dp_${task_name}
  entity: roccendalanda-cuhk
  resume: True
  mode: online
  name: diff_c_demo${n_demo}
  tags: ["${name}", "${task_name}", "${exp_name}"]
  id: null
  group: null

checkpoint:
  topk:
    monitor_key: val_loss
    mode: min
    k: 1
    format_str: 'best.ckpt'
  save_last_ckpt: False
  save_last_snapshot: False

multi_run:
  run_dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}_demo${n_demo}
  wandb_name_base: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}_demo${n_demo}

hydra:
  job:
    override_dirname: ${name}
  run:
    dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}_demo${n_demo}
  sweep:
    dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}_demo${n_demo}
    subdir: ${hydra.job.num}
