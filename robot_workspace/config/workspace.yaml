  port: 8082
  loop_hz: 60.0
  tracking_button_index: 4
  trigger_close_threshold: 0.5
  relative_translation_scale: 1.0
  relative_rotation_scale: 0.3
  max_tracking_position_error_m: 0.3
  operator_yaw_offset_deg: 180.0
  use_force_control_for_gripper: true
  max_gripper_width: 0.078
  min_gripper_width: 0.0
