recording:
  enabled: true
  run_root: /home/zhenya/kenny/visuotact/vt_franka/robot_workspace/data/runs
  image_format: jpg
  postprocess_target_hz: 10.0

operator_ui:
  enabled: true
  host: 127.0.0.1
  port: 8083
  log_buffer_size: 1000
  snapshot_max_age_sec: 1.5

collect:
  sync_hz: 10.0
  controller_state_poll_hz: 60.0
  controller_state_max_age_sec: 2.0
  quest_message_timeout_sec: 2.0
  require_quest_connection: true
  start_countdown_sec: 2.0
  auto_postprocess: true
  auto_qc: true
  controller_gap_warn_sec: 0.5
  controller_gap_fail_sec: 2.0
  status_print_hz: 1.0
  record_raw_quest_messages: true

auto_collect:
  command_hz: 15.0
  controller_state_poll_hz: 15.0
  init_pose_xyz_rpy_deg: [0.03, 0.4, 0.3, -180.0, 0.0, 45.0]
  hover_z_m: 0.35
  lift_z_m: 0.24
  table_z_m: 0.14
  grasp_force: 5.0
  pose_tolerance_m: 0.015
  yaw_tolerance_deg: 10.0
  pose_settle_timeout_sec: 8.0
  settle_dwell_sec: 0.3
  post_grasp_dwell_sec: 0.5
  post_release_dwell_sec: 0.5
  gripper_close_wait_sec: 1.8
  gripper_settle_timeout_sec: 3.0
  gripper_open_tolerance_m: 0.015
  auto_continue: false
  segment_durations_sec:
    approach: 3.0
    descend: 3.0
    lift: 2.0
    transfer: 3.0
    place_descend: 3.0
    retreat: 2.0

calibration:
  calibration_dir: /home/zhenya/kenny/visuotact/vt_franka/robot_workspace/config/calibration/v6

reset:
  default_profile: ready
  profiles:
    ready:
      eef_pose_xyz_rpy_deg: [0.0, 0.45, 0.5, 180.0, 0.0, 45.0]
      eef_duration_sec: 2.0
      gripper_target: open
      gripper_width: 0.078
      gripper_velocity: 0.1
      gripper_force_limit: 7.0

rollout:
  control_hz: 10.0
  max_duration_sec: 30.0
  start_countdown_sec: 2.0
  status_print_hz: 1.0
  policy:
    entrypoint: "kenny.policies.mpd_diffusion_policy:create_policy"
    kwargs:
      checkpoint_path: "/home/zhenya/kenny/visuotact/vt_franka/robot_workspace/third_parties/movement-primitive-diffusion/wandb/latest-run/files/model_epoch_200.pth"
      config_path: "/home/zhenya/kenny/visuotact/vt_franka/robot_workspace/third_parties/movement-primitive-diffusion/outputs/2026-04-22/23-12-08/.hydra/config.yaml"
      scaler_path: "/home/zhenya/kenny/visuotact/vt_franka/robot_workspace/data/mpd/put_cup_on_plate/scaler_values.npz"
      device: "cuda"
      confirm_before_execute: false
      control_hz: 10.0
      replan_interval_steps: 3
      latency_step: 3
      ensemble_mode: "hato"
      ensemble_tau: 0.6
      max_translation_step_m: 0.008
      max_rotation_step_deg: 0.6
      gripper_close_threshold: 0.65
      gripper_open_threshold: 0.35
      open_gripper_width: 0.078
      gripper_velocity: 0.1
      gripper_force_limit: 7.0
      open_width_tolerance_m: 0.015
      open_resend_interval_steps: 5
      debug_timing_log_interval_sec: 2.0
    inputs:
      controller_state: true
      rgb_cameras:
        - wrist
        - third_person
