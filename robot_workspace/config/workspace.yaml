  device_name_contains: GelSight Mini
  device_serial_number: 2BUUCE3E
  fps: 15
  width: 640
  height: 480
  exposure: -6
  contrast: 100
  marker_dimension: 2
  marker_vis_rotation_deg: 0.0
  vis_latency_steps: 5
  teleop_status_host: 127.0.0.1
  teleop_status_port: 8082
