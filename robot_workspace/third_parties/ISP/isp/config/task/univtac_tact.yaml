name: univtac_tact

shape_meta: &shape_meta
  obs:
    robot0_eye_in_hand_image:
      # NOTE: BIGFOV wrist RGB now uses center-crop-to-square before resize.
      shape: [3, 84, 84]
      type: rgb
    robot0_eef_pos:
      shape: [3]
    robot0_eef_quat:
      shape: [4]
    robot0_gripper_qpos:
      shape: [2]
    robot0_tactile_left_image:
      shape: [3, 84, 84]
      type: rgb
    robot0_tactile_right_image:
      shape: [3, 84, 84]
      type: rgb
  action:
    shape: [10]

abs_action: &abs_action True

dataset:
  _target_: ${dataset}
  shape_meta: *shape_meta
  dataset_root: ${dataset_root}
  task_name: ${task_name}
  split: ${data_split}
  n_demo: ${n_demo}
  horizon: ${horizon}
  pad_before: ${eval:'${n_obs_steps}-1+${n_latency_steps}'}
  pad_after: ${eval:'${n_action_steps}-1'}
  n_obs_steps: ${dataset_obs_steps}
  abs_action: *abs_action
  use_legacy_normalizer: False
  normalization_mode: default
  use_cache: True
  seed: 42
  val_ratio: 0.2
  ws_center_source: auto
  ws_x_center: ${get_ws_x_center:${task_name}}
  ws_y_center: ${get_ws_y_center:${task_name}}
  ws_z_center: ${get_ws_z_center:${task_name}}
