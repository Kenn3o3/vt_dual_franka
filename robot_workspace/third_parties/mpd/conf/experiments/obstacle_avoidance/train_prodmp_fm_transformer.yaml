# @package _global_
defaults:
  - train_defaults
  - /agent_config: prodmp_transformer_agent
  - process_batch_config: prodmp
  - encoder_config: state_passthrough
  - prodmp_handler_config: prodmp_handler
  - override /agent_config/model_config/inner_model_config: prodmp_transformer
  - _self_

# Enable Flow Matching algorithm
agent_config:
  model_config:
    algorithm: flow_matching
    use_ot_sampler: False

predict_past: False  # ProDMP doesn't support predict_past yet
method_name: prodmp_fm

swanlab:
  entity: motif
  project: movement-primitive-diffusion
  group: prodmp-fm-transformer
